version: '3.8'

services:
  network-backup:
    build: .
    image: network-backup-orchestrator:latest
    container_name: network-backup
    volumes:
      # Mount backup directory to host
      - ./backups:/backups
      # Optional: Mount custom config
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Europe/Copenhagen
      - BACKUP_PATH=/backups
    network_mode: host  # Needed for direct device access
    stdin_open: true
    tty: true
